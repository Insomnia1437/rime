# Rime schema
# encoding: utf-8
#
# Kagiroi 全角片假名入口。与主 Kagiroi 共享词典、Viterbi 转换和用户学习。

__include: kagiroi.schema.yaml:/

schema:
  schema_id: kagiroi_katakana
  name: カギロイ・カナ
  version: "2026-07-23"

switches:
  - name: ascii_mode
    reset: 0
    states: [ カナ, 英字 ]
  - options: [ hiragana, katakana, hw_katakana ]
    reset: 1
    states: [ ひらがな, カタカナ, ｶﾀｶﾅ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: emoji
    states: [ 🈚, 🈶 ]

key_binder:
  import_preset: default
  bindings:
    __include: default:/key_binder/bindings
