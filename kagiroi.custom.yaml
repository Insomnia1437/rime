# Kagiroi 个人补丁。
# 上游 schema 和词库可以直接更新；本文件保留本项目的按键习惯。

patch:
  schema/name: 日语

  # 标准日语方案固定为平假名/汉字转换，不在方案菜单重复展示字符模式。
  switches: []

  # 不使用上游的 -/= 翻页，避免影响日语长音「ー」。
  # Ctrl+u/i/o 模式快捷键也不需要，宽度模式统一从 Ctrl+. 选择方案。
  key_binder/bindings:
    __include: default:/key_binder/bindings

  engine/processors:
    __include: kagiroi_personal:/processors

  personal_kagiroi/default_kana_mode: hiragana
  personal_kagiroi/default_ascii_width: half
