# Rime schema
# encoding: utf-8
#
# 全角片假名 + 默认全角英数字符号；与标准 Kagiroi 共享用户学习。

__include: kagiroi.schema.yaml:/

schema:
  schema_id: kagiroi_full
  name: 日语全角
  version: "2026-07-23"

switches:
  - name: full_shape
    reset: 1
    states: [ 英数符号半角, 英数符号全角 ]

engine/processors:
  __include: kagiroi_personal:/processors

key_binder:
  import_preset: default
  bindings:
    __include: default:/key_binder/bindings

personal_kagiroi:
  default_kana_mode: katakana
  default_ascii_width: switch

__patch:
  punctuator/full_shape:
    __include: kagiroi:/punct/3_dan/full_shape
  punctuator/half_shape:
    __include: kagiroi_personal:/half_shape
